  <line x1="156" y1="57"  x2="175" y2="66"  stroke-width="1.6"/>

  <!-- ── ZONE 4 → TOP branches ── -->
  <line x1="68"  y1="61"  x2="90"  y2="37"  stroke-width="1.6"/>
  <line x1="90"  y1="55"  x2="90"  y2="37"  stroke-width="1.5"/>
  <line x1="90"  y1="55"  x2="112" y2="28"  stroke-width="1.5"/>
  <line x1="110" y1="49"  x2="112" y2="28"  stroke-width="1.4"/>
  <line x1="132" y1="49"  x2="128" y2="28"  stroke-width="1.4"/>
  <line x1="156" y1="57"  x2="128" y2="28"  stroke-width="1.5"/>
  <line x1="156" y1="57"  x2="150" y2="39"  stroke-width="1.5"/>
  <line x1="175" y1="66"  x2="150" y2="39"  stroke-width="1.6"/>

