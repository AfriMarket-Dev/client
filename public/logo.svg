  <line x1="90"  y1="37"  x2="112" y2="28"  stroke-width="1.4"/>
  <line x1="112" y1="28"  x2="128" y2="28"  stroke-width="1.4"/>
  <line x1="128" y1="28"  x2="150" y2="39"  stroke-width="1.4"/>

</g><!-- /network lines -->


<!-- ═══════════════════════════════════════════════════
     SHOPPING CART  —  integrated at bottom of continent
     Basket top at y=234, centered at x=118
════════════════════════════════════════════════════ -->

<g stroke="url(#ig)" stroke-linecap="round" stroke-linejoin="round" fill="none">
  <!-- Handle arm -->
  <path d="M 70,244 C 70,234 77,231 84,233" stroke-width="2.8"/>
  <!-- Basket (trapezoid: wider at top) -->
  <path d="M 84,233 L 156,233 L 146,272 L 92,272 Z" stroke-width="2.8"/>
  <!-- Vertical dividers (3, creating 4 columns) -->
  <line x1="103" y1="233" x2="107" y2="272" stroke-width="2.1"/>
  <line x1="120" y1="233" x2="119" y2="272" stroke-width="2.1"/>
  <line x1="138" y1="233" x2="132" y2="272" stroke-width="2.1"/>
  <!-- Horizontal rails (2 rails) -->
  <line x1="87"  y1="246" x2="153" y2="246" stroke-width="2.1"/>
  <line x1="90"  y1="259" x2="149" y2="259" stroke-width="2.1"/>
  <!-- Axle bar -->
  <line x1="97"  y1="275" x2="141" y2="275" stroke-width="1.4" opacity="0.4"/>
</g>

<!-- Cart wheels (solid dark crimson) -->
<circle cx="107" cy="283" r="9"   fill="#7A0E0E"/>
<circle cx="107" cy="283" r="4"   fill="none" stroke="#B02222" stroke-width="1.8"/>
<circle cx="135" cy="283" r="9"   fill="#7A0E0E"/>
<circle cx="135" cy="283" r="4"   fill="none" stroke="#B02222" stroke-width="1.8"/>


