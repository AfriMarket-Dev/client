  <line x1="134" y1="130" x2="132" y2="104" stroke-width="1.9"/>
  <line x1="134" y1="130" x2="158" y2="108" stroke-width="1.9"/>
  <line x1="172" y1="132" x2="158" y2="108" stroke-width="2"/>
  <line x1="172" y1="132" x2="180" y2="113" stroke-width="2"/>

  <!-- ── ZONE 2 cross-connections ── -->
  <line x1="50"  y1="110" x2="80"  y2="106" stroke-width="1.8"/>
  <line x1="80"  y1="106" x2="108" y2="104" stroke-width="1.8"/>
  <line x1="108" y1="104" x2="132" y2="104" stroke-width="1.8"/>
  <line x1="132" y1="104" x2="158" y2="108" stroke-width="1.8"/>
  <line x1="158" y1="108" x2="180" y2="113" stroke-width="1.8"/>

  <!-- ── ZONE 2 → ZONE 3 branches ── -->
  <line x1="50"  y1="110" x2="42"  y2="83"  stroke-width="1.9"/>
  <line x1="50"  y1="110" x2="65"  y2="80"  stroke-width="1.9"/>
