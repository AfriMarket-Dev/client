  <line x1="118" y1="148" x2="134" y2="130" stroke-width="2"/>
  <line x1="150" y1="158" x2="134" y2="130" stroke-width="2.1"/>
  <line x1="150" y1="158" x2="172" y2="132" stroke-width="2.1"/>

  <!-- ── ZONE 1 cross-connections ── -->
  <line x1="65"  y1="132" x2="104" y2="130" stroke-width="1.9"/>
  <line x1="104" y1="130" x2="118" y2="122" stroke-width="1.9"/>
  <line x1="118" y1="122" x2="134" y2="130" stroke-width="1.9"/>
  <line x1="134" y1="130" x2="172" y2="132" stroke-width="1.9"/>

  <!-- ── ZONE 1 → ZONE 2 branches ── -->
  <line x1="65"  y1="132" x2="50"  y2="110" stroke-width="2"/>
  <line x1="65"  y1="132" x2="80"  y2="106" stroke-width="2"/>
  <line x1="104" y1="130" x2="80"  y2="106" stroke-width="1.9"/>
