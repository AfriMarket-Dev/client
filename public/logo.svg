<!-- ═══════════════════════════════════════════════════
     NETWORK LINES  —  tree-branch triangulation mesh
     Levels T(trunk) → F1 → Z1 → Z2 → Z3 → Z4 → TOP
════════════════════════════════════════════════════ -->

<g stroke="url(#ig)" stroke-linecap="round" stroke-linejoin="round" fill="none">

  <!-- ── TRUNK (central spine) ── -->
  <line x1="118" y1="230" x2="118" y2="200" stroke-width="2.6"/>
  <line x1="118" y1="200" x2="118" y2="175" stroke-width="2.6"/>

  <!-- ── MAIN FORK from (118,175) ── -->
  <line x1="118" y1="175" x2="90"  y2="158" stroke-width="2.3"/>
  <line x1="118" y1="175" x2="118" y2="148" stroke-width="2.3"/>
  <line x1="118" y1="175" x2="150" y2="158" stroke-width="2.3"/>

  <!-- ── F1 → ZONE 1 branches ── -->
  <line x1="90"  y1="158" x2="65"  y2="132" stroke-width="2.1"/>
  <line x1="90"  y1="158" x2="104" y2="130" stroke-width="2.1"/>
  <line x1="118" y1="148" x2="104" y2="130" stroke-width="2"/>
