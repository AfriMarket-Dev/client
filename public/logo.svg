  <line x1="112" y1="72"  x2="138" y2="74"  stroke-width="1.7"/>
  <line x1="138" y1="74"  x2="163" y2="81"  stroke-width="1.7"/>
  <line x1="163" y1="81"  x2="180" y2="88"  stroke-width="1.7"/>

